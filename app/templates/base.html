<!DOCTYPE html>
<html lang="en" class="h-full">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>{% block title %}Journal{% endblock %} | PrismA</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script>
        tailwind.config = {
            darkMode: 'class',
            theme: {
                extend: {
                    colors: {
                        primary: {{ theme_colors | tojson }},
                        surface: { 50: '#f8fafc', 100: '#f1f5f9', 200: '#e2e8f0', 300: '#cbd5e1', 400: '#94a3b8', 500: '#64748b', 600: '#475569', 700: '#334155', 800: '#1e293b', 900: '#0f172a' },
                    }
                }
            }
        }
    </script>
    <script>
        // Apply theme mode immediately to prevent flash
        const themeMode = '{{ ui_settings.theme_mode if ui_settings else "auto" }}';
        if (themeMode === 'dark') {
            document.documentElement.classList.add('dark');
        } else if (themeMode === 'light') {
            document.documentElement.classList.remove('dark');
        } else {
            if (localStorage.getItem('theme') === 'dark' ||
                (!localStorage.getItem('theme') && window.matchMedia('(prefers-color-scheme: dark)').matches)) {
                document.documentElement.classList.add('dark');
            }
        }
    </script>
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700&display=swap');
        :root {
            --ink: #1c1c1c;
            --muted: #6b6b6b;
            --panel: #ffffff;
            --panel-muted: #f4f4f5;
            --line: #e6e6e6;
            --shadow: 0 20px 40px -30px rgba(0, 0, 0, 0.35);
        }
        body { font-family: 'Inter', sans-serif; background: #f5f5f5; color: var(--ink); }
        body.ui-font-small { font-size: 14px; }
        body.ui-font-medium { font-size: 16px; }
        body.ui-font-large { font-size: 18px; }
        body.ui-compact main { padding-top: 1.5rem; padding-bottom: 1.5rem; }
        body.ui-comfortable main { padding-top: 2.25rem; padding-bottom: 2.25rem; }
        .prose { max-width: 72ch; }
        .prose p { margin-bottom: 1em; line-height: 1.75; }
        .line-clamp-2 { display: -webkit-box; -webkit-line-clamp: 2; -webkit-box-orient: vertical; overflow: hidden; }
        .line-clamp-3 { display: -webkit-box; -webkit-line-clamp: 3; -webkit-box-orient: vertical; overflow: hidden; }
        .surface-panel { background: var(--panel); border: 1px solid var(--line); border-radius: 18px; box-shadow: var(--shadow); }
        .surface-plain { background: var(--panel); border: 1px solid var(--line); border-radius: 16px; }
        .sidebar-shadow { box-shadow: 16px 0 40px -40px rgba(0, 0, 0, 0.4); }
        .soft-ring { box-shadow: 0 0 0 1px rgba(28, 28, 28, 0.06); }
        .hb-loader {
            width: 64px;
            height: 64px;
            position: relative;
        }
        .hb-loader svg {
            position: absolute;
            inset: 0;
            transform-origin: 50% 50%;
            fill: none;
            stroke: #1f2937;
            stroke-width: 1.6;
        }
        .hb-heart {
            animation: hbSwap 2.6s infinite;
        }
        .hb-brain {
            animation: hbSwap 2.6s infinite reverse;
        }
        @keyframes hbSwap {
            0% { opacity: 1; transform: scale(1) rotate(0deg); }
            35% { opacity: 1; transform: scale(1) rotate(120deg); }
            50% { opacity: 0; transform: scale(0.7) rotate(180deg); }
            70% { opacity: 0; transform: scale(0.7) rotate(220deg); }
            100% { opacity: 1; transform: scale(1) rotate(360deg); }
        }
    </style>
    <link rel="stylesheet" href="/static/css/custom.css">
    <style>
        /* Prevent flash of unanimated content */
        .card-fade-in { opacity: 0; }
    </style>
    {% block head %}{% endblock %}
</head>
<body class="h-full text-surface-900 transition-colors duration-200 {{ ui_body_classes }}">
    <div class="min-h-full flex" style="background-image: url('/static/images/Background_image.png'), linear-gradient(to bottom right, #f7f7f7, #f3f3f4, #ededee); background-size: cover; background-position: center; background-attachment: fixed;">
        <aside id="sidebar" class="fixed inset-y-0 left-0 z-40 w-64 -translate-x-full lg:translate-x-0 transition-transform duration-200 bg-white border-r border-surface-200 sidebar-shadow">
            <div class="flex flex-col h-full px-5 py-6">
                <div class="flex items-center justify-between">
                    <a href="/" class="flex items-center gap-2">
                        <img src="/static/images/Prisma_logo.png" alt="PrismA" class="h-8 w-auto">
                    </a>
                    <button id="sidebar-close" class="lg:hidden p-1.5 rounded-lg text-surface-500 hover:bg-surface-100" aria-label="Close sidebar">
                        <svg class="w-4 h-4" fill="none" stroke="currentColor" viewBox="0 0 24 24">
                            <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M6 18L18 6M6 6l12 12"/>
                        </svg>
                    </button>
                </div>
                <p class="mt-1 text-xs text-surface-400">Secure Journal</p>

                <nav class="mt-8 space-y-2">
                    <a href="/" class="flex items-center gap-3 px-3 py-2 text-sm font-medium rounded-xl text-surface-700 hover:bg-surface-100">
                        <svg class="w-4 h-4" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M3 12l2-2m0 0l7-7 7 7M5 10v10a1 1 0 001 1h3m10-11l2 2m-2-2v10a1 1 0 01-1 1h-3m-6 0h6"/></svg>
                        Dashboard
                    </a>
                    <a href="/journal" class="flex items-center gap-3 px-3 py-2 text-sm font-medium rounded-xl text-surface-700 hover:bg-surface-100">
                        <svg class="w-4 h-4" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M12 6v12m6-6H6"/></svg>
                        Journal
                    </a>
                    <a href="/entry/new" class="flex items-center gap-3 px-3 py-2 text-sm font-medium rounded-xl text-surface-700 hover:bg-surface-100">
                        <svg class="w-4 h-4" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M12 4v16m8-8H4"/></svg>
                        New Entry
                    </a>
                    <a href="/ask" class="flex items-center gap-3 px-3 py-2 text-sm font-medium rounded-xl text-surface-700 hover:bg-surface-100">
                        <svg class="w-4 h-4" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M7 8h10M7 12h6m-2 8a9 9 0 110-18 9 9 0 010 18z"/></svg>
                        Ask
                    </a>
                    <a href="/search" class="flex items-center gap-3 px-3 py-2 text-sm font-medium rounded-xl text-surface-700 hover:bg-surface-100">
                        <svg class="w-4 h-4" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M21 21l-6-6m2-5a7 7 0 11-14 0 7 7 0 0114 0z"/></svg>
                        Search
                    </a>
                </nav>

                <div class="mt-auto space-y-3">
                    {% if not service_status.ollama %}
                    <div class="text-xs text-red-500" title="{{ service_status.ollama_message }}">LLM offline</div>
                    {% endif %}
                    <div class="flex items-center gap-2">
                        <button id="theme-toggle" type="button" class="p-2 rounded-lg text-surface-500 hover:bg-surface-100 transition-colors" title="Toggle dark mode">
                            <svg id="theme-light-icon" class="hidden w-5 h-5" fill="none" stroke="currentColor" viewBox="0 0 24 24">
                                <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M12 3v1m0 16v1m9-9h-1M4 12H3m15.364 6.364l-.707-.707M6.343 6.343l-.707-.707m12.728 0l-.707.707M6.343 17.657l-.707.707M16 12a4 4 0 11-8 0 4 4 0 018 0z"/>
                            </svg>
                            <svg id="theme-dark-icon" class="hidden w-5 h-5" fill="none" stroke="currentColor" viewBox="0 0 24 24">
                                <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M20.354 15.354A9 9 0 018.646 3.646 9.003 9.003 0 0012 21a9.003 9.003 0 008.354-5.646Z"/>
                            </svg>
                        </button>
                        <a href="/settings" class="text-xs text-surface-500 hover:text-surface-900 transition-colors">Settings</a>
                        <a href="/status" class="text-xs text-surface-500 hover:text-surface-900 transition-colors">Status</a>
                    </div>
                </div>
            </div>
        </aside>

        <div id="sidebar-overlay" class="fixed inset-0 bg-black/40 opacity-0 pointer-events-none transition-opacity duration-200 lg:hidden"></div>

        <div class="flex-1 min-w-0 lg:ml-64">
            <header class="sticky top-0 z-30 bg-[#f5f5f5]/80 backdrop-blur border-b border-surface-200">
                <div class="max-w-6xl mx-auto px-6 py-4 flex items-center justify-between">
                    <div class="flex items-center gap-3">
                        <button id="sidebar-open" class="lg:hidden p-2 rounded-lg text-surface-500 hover:bg-surface-100" aria-label="Open sidebar">
                            <svg class="w-5 h-5" fill="none" stroke="currentColor" viewBox="0 0 24 24">
                                <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M4 6h16M4 12h16M4 18h16"/>
                            </svg>
                        </button>
                        <span class="text-sm text-surface-500">{{ theme_name | title }} mode</span>
                    </div>
                    <div class="flex items-center gap-2">
                        <a href="/entry/new" class="hidden sm:inline-flex items-center gap-2 px-4 py-2 rounded-full bg-surface-900 text-white text-xs font-medium">
                            <svg class="w-4 h-4" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M12 4v16m8-8H4"/></svg>
                            New Entry
                        </a>
                    </div>
                </div>
            </header>

            <main class="max-w-6xl mx-auto px-6">
                {% block content %}{% endblock %}
            </main>
        </div>
    </div>

    <div id="global-loader" class="hidden fixed inset-0 z-50 items-center justify-center bg-black/30 backdrop-blur-sm">
        <div class="surface-panel px-8 py-6 flex flex-col items-center gap-4">
            <div class="hb-loader">
                <svg class="hb-heart" viewBox="0 0 24 24" aria-hidden="true">
                    <path d="M12 20.5s-7-4.35-9.4-8.2C.6 9.2 2.2 5.5 6 5.5c2.1 0 3.4 1.2 4 2.3.6-1.1 1.9-2.3 4-2.3 3.8 0 5.4 3.7 3.4 6.8C19 16.1 12 20.5 12 20.5z"/>
                </svg>
                <svg class="hb-brain" viewBox="0 0 24 24" aria-hidden="true">
                    <path d="M8.5 5.5a3 3 0 015.5-1.5 3 3 0 015.5 1.5 3 3 0 010 6 3 3 0 01-1.5 5.6 3 3 0 01-5.5 1.4 3 3 0 01-5.5-1.4A3 3 0 013 11.5a3 3 0 015.5-6z"/>
                </svg>
            </div>
            <p id="global-loader-text" class="text-sm text-surface-600">Thinking...</p>
        </div>
    </div>

    <script src="/static/js/app.js"></script>
    {% block scripts %}{% endblock %}
</body>
</html>
